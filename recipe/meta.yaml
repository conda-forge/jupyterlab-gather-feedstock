{% set name = "jupyterlab-gather" %}
{% set version = "0.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jupyterlab_gather-{{ version }}.tar.gz
  sha256: e0754fa2a8a676a18adb8630c42b94381f0b37e90ca185699f6546a4ef1f7029

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.5.0
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
    - pip
  run:
    - python >={{ python_min }}
    - jupyter_server >=2.0.1,<3
    - pyjwt

test:
  imports:
    - jupyterlab_gather
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/QuantStack/jupyterlab-gather
  summary: Video presentation over WebRTC with AR capabilities.
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/QuantStack/jupyterlab-gather

extra:
  recipe-maintainers:
    - gjmooney
